# DEPRECATED — migrado para Railway. Ver railway.toml na raiz do repositório.

databases:
  - name: crm-vitao360-db
    plan: free
    region: oregon
    databaseName: crm_vitao360
    user: crm_user

services:
  - type: web
    name: crm-vitao360-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: bash render_build.sh
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: DATABASE_URL
        fromDatabase:
          name: crm-vitao360-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://crm-vitao360.vercel.app,https://crm-vitao360-*.vercel.app,http://localhost:3000
      - key: JWT_SECRET
        generateValue: true
